name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        # Use `npm install` in CI when no package-lock.json is present.
        # `npm ci` requires an existing lockfile and will fail without one.
        run: npm install
      - name: Run tests
        run: npm test
